<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNBT Master: Gradien & Garis Lurus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .option-input:checked + .option-card { 
            border-color: #4f46e5; 
            background-color: #eef2ff; 
        }
        .option-input:checked + .option-card .option-marker {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        #modal-overlay { backdrop-filter: blur(12px); display: none; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="min-h-screen text-slate-900" oncontextmenu="return false;">

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-100">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h1 class="font-extrabold text-lg">SNBT Master</h1>
            </div>
            <div id="quiz-meta" class="hidden flex items-center space-x-4">
                <div id="violation-badge" class="hidden flex items-center space-x-2 bg-rose-50 border border-rose-100 px-3 py-1.5 rounded-full">
                    <span class="text-[9px] font-black text-rose-600 uppercase tracking-tighter">Pelanggaran: <span id="violation-count">0</span>/3</span>
                </div>
                <div class="bg-slate-900 px-4 py-2 rounded-2xl shadow-sm">
                    <span id="time" class="font-mono font-bold text-white tracking-widest text-sm">10:00</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Landing Section -->
        <div id="landingSection" class="max-w-xl mx-auto bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
            <div class="bg-indigo-600 p-10 text-white text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 -mr-10 -mt-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                <h2 class="text-3xl font-black mb-2 uppercase tracking-tight">Latihan Gradien</h2>
                <p class="text-indigo-100 opacity-90 italic">Uji Kemampuan Persamaan Garis Lurus</p>
            </div>
            <div class="p-10 space-y-8">
                <div class="space-y-3">
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Nama Lengkap Peserta</label>
                    <input type="text" id="userName" class="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl focus:border-indigo-500 focus:bg-white outline-none transition-all font-bold text-slate-800" placeholder="Masukkan nama Anda...">
                </div>
                <button onclick="mulaiKuis()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-3xl transition-all shadow-xl shadow-indigo-100 uppercase tracking-[0.2em] transform active:scale-95">
                    Mulai Ujian
                </button>
            </div>
        </div>

        <!-- Loading Section -->
        <div id="loadingSection" class="hidden flex flex-col items-center justify-center min-h-[50vh] space-y-4">
            <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
            <p class="font-bold text-slate-500 tracking-wide">Sedang mengirimkan data...</p>
        </div>

        <!-- Quiz Section -->
        <div id="quizSection" class="hidden space-y-8 max-w-3xl mx-auto">
            <div id="isiSoal" class="space-y-8 pb-24"></div>
            
            <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-200 p-4 z-40">
                <div class="max-w-3xl mx-auto flex justify-center">
                    <button onclick="tampilkanKonfirmasiSelesai()" class="w-full max-w-md bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-100 transition-all uppercase tracking-widest text-sm transform active:scale-95">
                        Kirim Jawaban Akhir
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Section -->
        <div id="resultSection" class="hidden max-w-2xl mx-auto space-y-8 text-center animate-in fade-in slide-in-from-bottom-6 duration-700">
            <div class="space-y-2">
                <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight">Hasil Latihan</h2>
                <p class="text-lg text-slate-500">Selamat <strong id="resNama" class="text-slate-900">Peserta</strong>, Anda telah menyelesaikan kuis!</p>
            </div>
            
            <div id="displaySkor" class="text-[140px] font-black text-rose-500 leading-none py-6 drop-shadow-sm">0</div>

            <div class="bg-[#f8faff] rounded-[2rem] border-l-[8px] border-sky-500 p-10 text-left shadow-sm border border-slate-100 relative overflow-hidden">
                <div class="absolute top-0 right-0 -mr-8 -mt-8 w-24 h-24 bg-sky-100 rounded-full blur-2xl opacity-40"></div>
                <div class="space-y-6 relative z-10">
                    <div class="flex items-start">
                        <span class="mt-1 mr-4 text-emerald-500 bg-emerald-100 p-1 rounded-full">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                        </span>
                        <div>
                            <p class="font-black text-slate-800 uppercase text-[10px] tracking-widest mb-1">Jawaban Benar</p>
                            <span id="listBenar" class="text-slate-600 font-bold italic text-lg leading-relaxed tracking-wide">Memuat...</span>
                        </div>
                    </div>
                    <div class="flex items-start">
                        <span class="mt-1 mr-4 text-rose-500 bg-rose-100 p-1 rounded-full">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
                        </span>
                        <div>
                            <p class="font-black text-slate-800 uppercase text-[10px] tracking-widest mb-1">Jawaban Salah</p>
                            <span id="listSalah" class="text-slate-600 font-bold italic text-lg leading-relaxed tracking-wide">Memuat...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-10">
                <button onclick="location.reload()" class="bg-slate-900 text-white font-bold py-5 px-16 rounded-full hover:bg-black transition-all shadow-xl shadow-slate-200 uppercase tracking-[0.2em] text-xs transform active:scale-95">Ulangi Sesi Kuis</button>
            </div>
        </div>
    </main>

    <!-- Modal System -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] max-w-sm w-full p-10 shadow-2xl transform transition-all">
            <h3 id="modal-title" class="text-2xl font-black text-center mb-4 tracking-tight"></h3>
            <p id="modal-desc" class="text-slate-500 text-center mb-10 text-sm leading-relaxed"></p>
            <div class="space-y-3">
                <button id="modal-btn-primary" class="w-full py-5 rounded-3xl font-black text-white bg-indigo-600 shadow-lg shadow-indigo-100 uppercase tracking-widest text-xs transform active:scale-95"></button>
                <button id="modal-btn-secondary" class="w-full py-4 text-slate-400 font-bold text-xs uppercase tracking-widest hidden hover:text-slate-600"></button>
            </div>
        </div>
    </div>

<script>
    // MASUKKAN URL WEB APP GOOGLE SCRIPT ANDA DI SINI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx8JikFKd9WeRP6vtWOogN-41lO5kp8T5_tzWnUTqigM-M6OCUe7zsQjqIkt00ps38YTw/exec";

    const soalData = [
        { q: "Gradien garis yang melalui titik \\(A(2,5)\\) dan \\(B(4,9)\\) adalah...", a: ["-2", "-1", "\\(\\frac{1}{2}\\)", "2", "4"], k: 3 },
        { q: "Persamaan garis \\(y = -3x + 7\\) memiliki gradien sebesar...", a: ["-3", "\\(-\\frac{1}{3}\\)", "3", "7", "-7"], k: 0 },
        { q: "Gradien dari persamaan garis \\(2x - 5y + 10 = 0\\) adalah...", a: ["\\(-\\frac{5}{2}\\)", "\\(-\\frac{2}{5}\\)", "\\(\\frac{2}{5}\\)", "\\(\\frac{5}{2}\\)", "2"], k: 2 },
        { q: "Jika sebuah garis k sejajar dengan garis \\(y = 4x - 1\\), maka gradien garis k adalah...", a: ["-4", "\\(-\\frac{1}{4}\\)", "\\(\\frac{1}{4}\\)", "1", "4"], k: 4 },
        { q: "Gradien garis yang tegak lurus dengan garis yang memiliki gradien \\(m = \\frac{3}{2}\\) adalah...", a: ["\\(\\frac{3}{2}\\)", "\\(\\frac{2}{3}\\)", "\\(-\\frac{2}{3}\\)", "\\(-\\frac{3}{2}\\)", "0"], k: 2 },
        { q: "Gradien garis yang melalui titik pusat koordinat \\(O(0,0)\\) dan titik \\(P(-3,6)\\) adalah...", a: ["-2", "\\(-\\frac{1}{2}\\)", "\\(\\frac{1}{2}\\)", "2", "3"], k: 0 },
        { q: "Diketahui sebuah garis melalui titik \\((1, a)\\) dan \\((4, 7)\\) dengan gradien 2. Nilai a yang memenuhi adalah...", a: ["1", "2", "3", "4", "5"], k: 0 },
        { q: "Gradien garis yang memotong sumbu-X di titik \\((4,0)\\) dan memotong sumbu-Y di titik \\((0,8)\\) adalah...", a: ["2", "\\(\\frac{1}{2}\\)", "\\(-\\frac{1}{2}\\)", "-2", "-4"], k: 3 },
        { q: "Di antara pilihan berikut, persamaan garis yang memiliki gradien paling kecil adalah...", a: ["\\(y = 2x + 5\\)", "\\(2y = x - 4\\)", "\\(x + y = 10\\)", "\\(3x - y = 2\\)", "\\(y = -2x + 1\\)"], k: 4 },
        { q: "Gradien garis singgung kurva \\(y = x^2\\) pada titik \\((1, 1)\\) adalah...", a: ["0", "1", "2", "3", "4"], k: 2 }
    ];

    let timer;
    let tabPindahCount = 0;
    let quizActive = false;
    let answers = Array(soalData.length).fill(null);

    function showModal({ title, desc, btnPrimary, btnSecondary, onConfirm }) {
        const overlay = document.getElementById('modal-overlay');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;
        const b1 = document.getElementById('modal-btn-primary');
        b1.innerText = btnPrimary.text;
        b1.onclick = () => { overlay.style.display = 'none'; if(onConfirm) onConfirm(); };
        const b2 = document.getElementById('modal-btn-secondary');
        if (btnSecondary) {
            b2.innerText = btnSecondary.text;
            b2.classList.remove('hidden');
            b2.onclick = () => { overlay.style.display = 'none'; };
        } else { b2.classList.add('hidden'); }
        overlay.style.display = 'flex';
    }

    window.onblur = function() {
        if (!quizActive) return;
        tabPindahCount++;
        document.getElementById('violation-count').innerText = tabPindahCount;
        document.getElementById('violation-badge').classList.remove('hidden');
        
        const badge = document.getElementById('violation-badge');
        badge.classList.add('animate-shake');
        setTimeout(() => badge.classList.remove('animate-shake'), 500);

        if (tabPindahCount >= 3) {
            hitungDanTampilkanHasil(true);
            showModal({ title: "AKSES DIBLOKIR", desc: "Anda berpindah jendela 3 kali. Sistem menghentikan sesi Anda secara otomatis.", btnPrimary: { text: "LIHAT HASIL" } });
        } else {
            showModal({ title: "PERINGATAN KERAS", desc: `Dilarang meninggalkan halaman kuis! Pelanggaran: ${tabPindahCount}/3.`, btnPrimary: { text: "KEMBALI KE KUIS" } });
        }
    };

    function mulaiKuis() {
        const name = document.getElementById('userName').value.trim();
        if (!name) {
            showModal({ title: "Nama Dibutuhkan", desc: "Silakan masukkan nama lengkap Anda untuk memulai sesi kuis.", btnPrimary: { text: "MENGERTI" } });
            return;
        }
        document.getElementById('landingSection').classList.add('hidden');
        document.getElementById('quizSection').classList.remove('hidden');
        document.getElementById('quiz-meta').classList.remove('hidden');
        quizActive = true;
        renderSoal();
        startTimer();
    }

    function renderSoal() {
        let html = "";
        soalData.forEach((s, i) => {
            html += `
                <div class="bg-white p-8 md:p-10 rounded-[2.5rem] border border-slate-200 shadow-sm">
                    <div class="flex items-start mb-8">
                        <span class="bg-indigo-600 text-white w-10 h-10 flex items-center justify-center rounded-2xl font-black mr-5 shrink-0 shadow-lg shadow-indigo-50 text-sm">${i+1}</span>
                        <div class="text-slate-800 font-bold text-xl leading-relaxed">${s.q}</div>
                    </div>
                    <div class="grid grid-cols-1 gap-3.5 ml-0 md:ml-14">
                        ${s.a.map((opt, idx) => `
                            <label class="block cursor-pointer group">
                                <input type="radio" name="q${i}" value="${idx}" class="option-input hidden" onchange="answers[${i}]=${idx}">
                                <div class="option-card border-2 border-slate-100 rounded-2xl p-5 flex items-center transition-all group-hover:border-indigo-100">
                                    <span class="option-marker w-9 h-9 flex items-center justify-center border-2 border-slate-100 rounded-xl text-[11px] font-black mr-5 text-slate-300 bg-white">${String.fromCharCode(65+idx)}</span>
                                    <span class="text-slate-600 font-semibold">${opt}</span>
                                </div>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        document.getElementById('isiSoal').innerHTML = html;
        if (window.MathJax) MathJax.typesetPromise();
    }

    function startTimer() {
        let timeLeft = 600;
        timer = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('time').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
            if (timeLeft <= 0) hitungDanTampilkanHasil();
        }, 1000);
    }

    function tampilkanKonfirmasiSelesai() {
        const unsolved = answers.filter(a => a === null).length;
        const msg = unsolved > 0 ? `Terdapat ${unsolved} soal yang belum Anda jawab. Yakin ingin mengakhiri sekarang?` : "Apakah Anda yakin ingin mengirimkan jawaban Anda?";
        
        showModal({
            title: "Selesaikan Kuis?",
            desc: msg,
            btnPrimary: { text: "YA, KIRIM DATA" },
            btnSecondary: { text: "PERIKSA LAGI" },
            onConfirm: () => hitungDanTampilkanHasil()
        });
    }

    async function hitungDanTampilkanHasil(isCheating = false) {
        clearInterval(timer);
        quizActive = false;
        window.onblur = null;
        document.getElementById('quizSection').classList.add('hidden');
        document.getElementById('loadingSection').classList.remove('hidden');

        let nomorBenar = [], nomorSalah = [];
        soalData.forEach((s, i) => {
            if (answers[i] === s.k) nomorBenar.push(i + 1);
            else nomorSalah.push(i + 1);
        });

        const skor = Math.round((nomorBenar.length / soalData.length) * 100);
        const namaSiswa = document.getElementById('userName').value;
        const benarListString = nomorBenar.length > 0 ? nomorBenar.join(', ') : "-";
        const salahListString = nomorSalah.length > 0 ? nomorSalah.join(', ') : "-";

        // Menyiapkan payload data
        const payload = JSON.stringify({ 
            nama: namaSiswa, 
            skor: skor, 
            status: isCheating ? "CURANG" : "OK",
            noBenar: benarListString,
            noSalah: salahListString
        });

        // KIRIM DATA KE GOOGLE SHEETS
        try {
            await fetch(SCRIPT_URL, {
                method: "POST", 
                mode: "no-cors",
                body: payload
            });
        } catch (e) {
            console.error("Gagal mengirim data:", e);
        }

        setTimeout(() => {
            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('displaySkor').innerText = skor;
            document.getElementById('resNama').innerText = namaSiswa;
            
            document.getElementById('listBenar').innerText = benarListString;
            document.getElementById('listSalah').innerText = salahListString;
        }, 1000);
    }
</script>
</body>
</html>
